<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Resume</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="section-light">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">AI Resume Builder</div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Dashboard</a>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 800px;">
        
        <div class="card" style="margin-bottom: 30px;">
            <h2 class="section-title" style="font-size: 24px;">Upload Resume to Enhance</h2>
            <form method="POST" enctype="multipart/form-data" style="margin-top: 20px;">
                {% csrf_token %}
                <div class="form-group">
                    <input type="file" name="resume_file" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Enhance Resume</button>
            </form>
        </div>

        {% if enhanced_resume %}
        <div class="card">
            <h2 class="section-title" style="font-size: 24px; margin-bottom: 20px;">Enhanced Resume Output</h2>
            
            <textarea readonly class="form-control" style="height: 350px; font-family: monospace; font-size: 13px;">{{ enhanced_resume }}</textarea>

            <div class="results-grid" style="margin-top: 20px;">
                <form method="POST" action="{% url 'download_resume_pdf' %}">
                    {% csrf_token %}
                    <input type="hidden" name="resume_text" value="{{ enhanced_resume }}">
                    <button type="submit" class="btn btn-primary btn-full">Download as PDF</button>
                </form>

                <form method="POST" action="{% url 'download_resume_doc' %}">
                    {% csrf_token %}
                    <input type="hidden" name="resume_text" value="{{ enhanced_resume }}">
                    <button type="submit" class="btn btn-secondary btn-full">Download as Word</button>
                </form>
            </div>
        </div>
        {% endif %}

    </div>

</body>
</html>
