<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.card {
    width: 420px;
    padding: 35px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.35);
    text-align: center;
}

.card h2 {
    font-size: 30px;
    margin-bottom: 10px;
    background: linear-gradient(45deg, #00dbde, #fc00ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card p {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    color: white;
    background: linear-gradient(90deg, #00dbde, #fc00ff);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(90deg, #fc00ff, #00dbde);
}

.message {
    margin-bottom: 15px;
    font-size: 14px;
    color: #ff8080;
}
</style>
</head>

<body>

<div class="card">
    <h2>Forgot Password</h2>
    <p>Enter your registered phone number to receive OTP</p>

    {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="phone" placeholder="Phone Number (10 digits)" required>
        <button type="submit">Send OTP</button>
    </form>
</div>

</body>
</html>
