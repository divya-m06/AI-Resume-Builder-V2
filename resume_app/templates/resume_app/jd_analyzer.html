<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Keyword Analyzer</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="section-light">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">AI Resume Builder</div>
        <div class="nav-links">
            <a href="{% url 'home' %}">Dashboard</a>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 800px;">
        <div class="card">
            <h1 class="section-title" style="font-size: 28px; margin-bottom: 24px;">Skill-Driven Project Suggestions</h1>

            <form method="POST" enctype="multipart/form-data" target="_blank" action="{% url 'jd_analyzer_result' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label>Paste Job Description</label>
                    <textarea name="job_description" class="form-control" rows="8" placeholder="Paste Job Description here..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Resume (PDF / DOCX)</label>
                    <input type="file" name="resume_file" class="form-control" accept=".pdf,.docx" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">Analyze JD Keywords</button>
            </form>
        </div>
    </div>

</body>
</html>
