<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Sign Up - AI Resume Builder</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="auth-page">

    <div class="card auth-card">
        <h1>AI Resume Builder</h1>
        <h2>Create Account</h2>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    <p class="alert-error">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Full Name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Email Address" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Phone Number" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Choose User ID</label>
                <input type="text" name="userid" placeholder="Choose User ID" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" name="password" placeholder="Create Password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>

        <p style="margin-top: 16px;">
            <a href="{% url 'login' %}">Already have an account? Login</a>
        </p>
    </div>

</body>
</html>
