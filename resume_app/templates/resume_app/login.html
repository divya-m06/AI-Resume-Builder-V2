<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Login - AI Resume Builder</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="auth-page">

    <div class="card auth-card">
        <h1>AI Resume Builder</h1>
        <img class="logo-img" src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Resume Icon">
        <h2>Welcome Back</h2>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    <p class="alert-error">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>User ID</label>
                <input type="text" name="userid" placeholder="User ID" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p style="margin-top: 16px;">
            <a href="{% url 'forgot_password' %}">Forgot Password?</a>
        </p>

        <p style="margin-top: 8px;">
            <a href="{% url 'signup' %}">Don’t have an account? <b>Sign Up</b></a>
        </p>
    </div>

</body>
</html>
