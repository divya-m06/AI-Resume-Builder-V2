<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="auth-page">

    <div class="card auth-card">
        <h1>AI Resume Builder</h1>
        <h2>Verify OTP</h2>
        <p style="margin-bottom: 24px; color: #666;">Enter the OTP sent to your phone</p>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    <p class="alert-error">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="text" name="otp" placeholder="••••••" class="form-control" style="text-align: center; letter-spacing: 4px; font-size: 18px;" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Verify OTP</button>
        </form>
    </div>

</body>
</html>
