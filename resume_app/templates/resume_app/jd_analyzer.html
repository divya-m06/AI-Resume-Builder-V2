<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JD Keyword Analyzer</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0f29;
        font-family: "Poppins", sans-serif;
        color: white;
    }

    h1 {
        text-align: center;
        margin-top: 40px;
        font-size: 45px;
        font-weight: 900;
        background: linear-gradient(90deg, #00eaff, #00ffaa);
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: 2px;
    }

    .wrapper {
        width: 60%;
        margin: 40px auto;
        background: #11172b;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 0 25px rgba(0,255,255,0.2);
    }

    label {
        display: block;
        font-size: 18px;
        margin-bottom: 8px;
        font-weight: 600;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 15px;
        border-radius: 12px;
        background: #1a2238;
        border: none;
        color: white;
        font-size: 16px;
        outline: none;
        resize: vertical;
        margin-bottom: 25px;
    }

    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(90deg, #00eaff, #007aff);
        border: none;
        border-radius: 12px;
        font-size: 20px;
        font-weight: 700;
        cursor: pointer;
        transition: .3s;
    }

    button:hover {
        transform: scale(1.04);
        opacity: 0.9;
    }
</style>
</head>

<body>

<h1>Skill-Driven Project Suggestions</h1>

<div class="wrapper">
    
    <form method="POST" 
        enctype="multipart/form-data"
        target="_blank"
        action="{% url 'jd_analyzer_result' %}">

        {% csrf_token %}

        <label>Paste Job Description</label>
        <textarea name="job_description" placeholder="Paste Job Description here..." required></textarea>

        <label>Upload Resume (PDF / DOCX)</label>
        <input type="file" name="resume_file" accept=".pdf,.docx" required>

        <button type="submit">Analyze JD Keywords</button>
    </form>


</div>

</body>
</html>
