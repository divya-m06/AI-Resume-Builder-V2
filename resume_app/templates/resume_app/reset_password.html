<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="auth-page">

    <div class="card auth-card">
        <h1>AI Resume Builder</h1>
        <h2>Reset Password</h2>
        <p style="margin-bottom: 24px; color: #666;">Create a new secure password for your account</p>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    <p class="alert-error">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="password" name="password" placeholder="New Password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <input type="password" placeholder="Confirm Password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Update Password</button>
        </form>
    </div>

</body>
</html>
