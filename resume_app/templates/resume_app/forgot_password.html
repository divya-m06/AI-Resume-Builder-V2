<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'resume_app/style.css' %}">
</head>
<body class="auth-page">

    <div class="card auth-card">
        <h1>AI Resume Builder</h1>
        <h2>Forgot Password</h2>
        <p style="margin-bottom: 24px; color: #666;">Enter your registered phone number to receive OTP</p>

        {% if messages %}
            <div class="alert">
                {% for message in messages %}
                    <p class="alert-error">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <input type="text" name="phone" placeholder="Phone Number (10 digits)" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Send OTP</button>
        </form>

        <p style="margin-top: 16px;">
            <a href="{% url 'login' %}">Back to Login</a>
        </p>
    </div>

</body>
</html>
